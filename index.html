<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Child Plus - Anganwadi Nutrition & Education Tracking</title>
  <meta name="description" content="Icon-driven early childhood growth tracking, WHO nutrition monitoring, and cognitive education platform for Anganwadis." />

  <!-- Fonts & Styling -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Supabase JS Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="app-header">
    <div class="nav-container">
      <div class="brand-logo-group" id="btnGoHome">
        <img src="logo.jpg" alt="Child Plus Logo" class="brand-logo-img" />
        <span class="brand-text">child<span>plus</span></span>
      </div>

      <div style="display:flex; align-items:center; gap:12px;">
        <!-- Supabase Live Sync Indicator -->
        <div id="supabaseStatusBadge" class="badge badge-green" style="font-size:0.75rem;">
          ⚡ Supabase Connected
        </div>

        <!-- 1-Click Language Switcher (English ⇄ Kannada) -->
        <button id="btnLangToggle" class="btn btn-light btn-sm" style="font-weight:700;">
          🌐 <span id="langText">ಕನ್ನಡ (Kannada)</span>
        </button>
      </div>

      <div class="user-nav-actions" id="navUserArea" style="display:none;">
        <div class="user-chip">
          <span id="navUserAvatar">👩‍⚕️</span>
          <span id="navUserName">User</span>
          <span class="role-badge" id="navUserRole">WORKER</span>
        </div>
        <button class="btn btn-secondary btn-sm" id="btnLogout">Logout 🚪</button>
      </div>
    </div>
  </header>

  <!-- Main App Viewport -->
  <main id="appContainer" class="app-content"></main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>© 2026 Child Plus | Anganwadi Nutritional & Educational Tracking System (SDG 4 Quality Education)</p>
  </footer>

  <!-- Application Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ai_engine.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components/games.js"></script>
  <script src="js/components/worker_view.js"></script>
  <script src="js/components/supervisor_view.js"></script>
  <script src="js/components/beneficiary_view.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
